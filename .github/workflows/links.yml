name: Check Links

on:
 push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            README.md Profile/README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
